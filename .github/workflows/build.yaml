name: GlimmerWorks Linux Production Build

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      # --- 关键新增步骤：升级 CMake ---
      - name: Setup CMake 4.x
        uses: lukka/get-cmake@latest
        # 或者指定具体版本:
        # with:
        #   cmakeVersion: 4.3.0

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            ninja-build \
            pkg-config \
            libx11-dev \
            libxcursor-dev \
            libxinerama-dev \
            libxrandr-dev \
            libxi-dev \
            libxfixes-dev \
            libxext-dev \
            libwayland-dev \
            libxkbcommon-dev \
            wayland-protocols \
            libdbus-1-dev \
            libgl1-mesa-dev \
            libglu1-mesa-dev \
            libegl1-mesa-dev \
            libvulkan-dev \
            libasound2-dev \
            libpulse-dev \
            libudev-dev

      - name: Configure CMake
        run: |
          # 检查版本确保升级成功
          cmake --version
          cmake -S . -B build \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DWAIT_FOR_INPUT=OFF

      - name: Build Project
        run: |
          cmake --build build --config Release --parallel $(nproc)

      - name: Upload Binaries
        uses: actions/upload-artifact@v4
        with:
          name: GlimmerWorks-Linux-Alpha
          path: |
            build/bin/
            build/*.so
            build/GlimmerWorks*
          if-no-files-found: warn
